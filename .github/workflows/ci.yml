# CI publique (GitHub) — porte minimale pour les PR sur le mirror : ruff + pytest +
# build frontend. La CI complète (e2e Playwright, scans de dépendances) reste sur
# GitLab (.gitlab-ci.yml, strippé du mirror). Python 3.13 requis (pyproject
# requires-python >=3.13) : on l'épingle explicitement (sinon faux échecs en 3.12).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Un nouveau push sur la même branche/PR rend le run en cours obsolète : on
# l'annule (économise les minutes de runner, feedback plus vite sur le dernier état).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # setup-uv plutôt que `pip install uv` : version gérée par l'action + cache uv
      # automatique (clé sur uv.lock). Cohérent avec docker-publish.yml.
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install deps (uv.lock figé)
        run: uv sync --frozen --all-extras
      - name: ruff
        run: uv run ruff check src tests
      - name: pytest
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Cache npm intégré (clé sur le lockfile) : `npm ci` repart tiède.
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Prouve que l'image Docker est constructible AVANT merge : la publication GHCR
  # (docker-publish.yml) ne tourne que sur main — sans ce job, une PR pouvait casser
  # le Dockerfile sans que rien ne le signale avant d'atteindre `latest`. Build
  # amd64 seul, SANS push ; le cache gha est partagé avec docker-publish.yml, dont
  # le build de publication repart donc tiède.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (amd64, sans push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
